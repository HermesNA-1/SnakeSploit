<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a1a; --bg2: #0d0d24; --bg3: #111130;
  --sidebar: #0d0d20; --sidebar-border: rgba(255,255,255,0.06);
  --card: rgba(16,16,40,0.6); --card-border: rgba(255,255,255,0.06);
  --accent: #00ff88; --accent2: #0066ff; --accent3: #ff3366;
  --accent-dim: rgba(0,255,136,0.1);
  --text: #e8e8f0; --text2: #8888aa; --text3: #555577;
  --code-bg: #0a0a15;
  --radius: 12px; --radius-sm: 8px;
  --sidebar-w: 280px;
}
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); display: flex;
  min-height: 100vh; line-height: 1.7;
}
::selection { background: var(--accent); color: #000; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); min-height: 100vh; position: fixed;
  background: var(--sidebar); border-right: 1px solid var(--sidebar-border);
  display: flex; flex-direction: column; z-index: 10;
}
.sidebar-header {
  padding: 20px 20px 16px; border-bottom: 1px solid var(--sidebar-border);
}
.sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
.sidebar-logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #000; font-weight: 900;
}
.sidebar-logo span { color: var(--accent); }
.sidebar-search {
  margin: 12px 14px; padding: 8px 12px; border-radius: 6px;
  border: 1px solid var(--card-border); background: rgba(0,0,0,0.2);
  color: var(--text2); font-size: 13px; outline: none; width: calc(100% - 28px);
  font-family: 'Inter', sans-serif;
}
.sidebar-search:focus { border-color: var(--accent); color: var(--text); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 10px; }
.nav-section { margin-bottom: 4px; }
.nav-section-title {
  padding: 8px 12px 4px; font-size: 10px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3); font-weight: 600;
}
.nav-link {
  display: block; padding: 6px 12px; border-radius: 6px;
  color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s;
  text-decoration: none; border: none; background: none; width: 100%; text-align: left;
}
.nav-link:hover { color: var(--text); background: var(--card); }
.nav-link.active { color: var(--accent); background: var(--accent-dim); }
.nav-link .badge {
  float: right; font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--accent-dim); color: var(--accent); font-weight: 600;
}

/* ── Main Content ── */
.main {
  margin-left: var(--sidebar-w); flex: 1; padding: 0; max-width: 900px;
}
.topbar {
  position: sticky; top: 0; z-index: 5;
  background: rgba(10,10,26,0.8); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 48px; height: 52px; display: flex; align-items: center; gap: 16px;
}
.topbar-links { display: flex; gap: 16px; margin-left: auto; }
.topbar-links a { font-size: 13px; color: var(--text2); text-decoration: none; }
.topbar-links a:hover { color: var(--text); }
.content { padding: 40px 48px 80px; }

/* ── Typography ── */
h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
h2 { font-size: 24px; font-weight: 700; margin: 40px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--card-border); }
h3 { font-size: 18px; font-weight: 600; margin: 28px 0 8px; }
p { color: var(--text2); margin-bottom: 16px; line-height: 1.7; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
strong { color: var(--text); font-weight: 600; }
code {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
  color: var(--accent); border: 1px solid rgba(255,255,255,0.05);
}
pre {
  background: var(--code-bg); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  padding: 20px; overflow-x: auto; margin: 16px 0;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6;
  color: #c0c0d0; position: relative;
}
pre .comment { color: var(--text3); font-style: italic; }
pre .keyword { color: var(--accent); }
pre .string { color: #ffbd2e; }
pre .func { color: #00ccff; }
pre .var { color: var(--accent3); }
pre .num { color: #b388ff; }
.copy-btn {
  position: absolute; top: 8px; right: 8px; padding: 4px 10px; border-radius: 4px;
  font-size: 11px; background: var(--card); border: 1px solid var(--card-border);
  color: var(--text2); cursor: pointer; font-family: 'Inter', sans-serif;
}
.copy-btn:hover { color: var(--text); background: var(--card-hover); }

/* ── Lists ── */
ul, ol { margin: 8px 0 16px 20px; color: var(--text2); }
li { margin: 4px 0; }
li > strong { color: var(--text); }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase;
     letter-spacing: 0.5px; color: var(--text3); font-weight: 600;
     border-bottom: 1px solid var(--card-border); }
td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text2); }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── Callouts ── */
.callout {
  padding: 16px 20px; border-radius: var(--radius-sm); margin: 20px 0;
  border-left: 3px solid;
}
.callout-info { background: rgba(0,102,255,0.08); border-color: var(--accent2); }
.callout-info strong { color: var(--accent2); }
.callout-warn { background: rgba(255,170,0,0.08); border-color: #ffaa00; }
.callout-warn strong { color: #ffaa00; }
.callout-tip { background: var(--accent-dim); border-color: var(--accent); }
.callout-tip strong { color: var(--accent); }

/* ── Command Cards ── */
.cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.cmd-card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  padding: 16px; transition: all 0.2s;
}
.cmd-card:hover { background: var(--card-hover); }
.cmd-card .cmd { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.cmd-card .desc { font-size: 12px; color: var(--text2); }

/* ── Steps ── */
.steps { counter-reset: step; margin: 20px 0; }
.step { counter-increment: step; margin-bottom: 20px; padding-left: 44px; position: relative; }
.step::before {
  content: counter(step);
  position: absolute; left: 0; top: 0;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent-dim); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.step h3 { margin: 0 0 6px; }
.step p { margin: 0 0 8px; }

/* ── Feature Tags ── */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.tag-new { background: var(--accent-dim); color: var(--accent); }
.tag-pro { background: rgba(0,102,255,0.15); color: var(--accent2); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 24px 20px 60px; }
  .topbar { padding: 0 20px; }
  .cmd-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<h2>Quick Install</h2>
<div class="steps">
  <div class="step"><h3>Clone the repository</h3><pre>git clone https://github.com/HermesNA-1/SnakeSploit.git<br>cd SnakeSploit</pre></div>
  <div class="step"><h3>Run the installer</h3><pre>python3 install.py</pre><p>This creates the symlink, sets up cron for auto-updates, and fetches the initial CVE cache.</p></div>
  <div class="step"><h3>Launch SnakeSploit</h3><pre>snakesploit</pre></div>
</div>

<h2>Manual Install</h2>
<pre>chmod +x snakesploit.py
ln -s $(pwd)/snakesploit.py ~/.local/bin/snakesploit
mkdir -p ~/.snakesploit/{cve_cache,poc_cache,loot,logs}</pre>

<h2>Web Dashboard</h2>
<p>The web GUI requires Flask:</p>
<pre>pip install flask
snakesploit --gui
<span class="comment"># Open: http://localhost:5000</span>
<span class="comment"># Or GitHub Pages: https://hermesna-1.github.io/SnakeSploit/</span></pre>

<h2>Dependencies</h2>

<ul>

  <div class="step"><h3>Scan a target</h3><pre>snakesploit > scan 192.168.1.100</pre><p>Discovers open ports and adds the target to your database automatically.</p></div>

  <div class="step"><h3>Search for relevant modules</h3><pre>snakesploit > search smb

snakesploit (smb_version_scanner) > check

<h2>Module System</h2>
<p>SnakeSploit uses a <strong>modular framework</strong> where each exploit, scanner, or auxiliary tool is a self-contained Python module.</p>

<h3>Module Types</h3>
<table>
  <tr><th>Type</th><th>Description</th><th>Example</th></tr>
  <tr><td><code>auxiliary</code></td><td>Scanners, fingerprinters, recon tools</td><td>smb_version_scanner, http_banner_grabber</td></tr>
  <tr><td><code>exploit</code></td><td>Vulnerability exploitation modules</td><td>Auto-generated from CVEs</td></tr>
  <tr><td><code>payload</code></td><td>Payload generation</td><td>Reverse shells, bind shells</td></tr>
</table>

<h3>Auto-Generated Modules</h3>
<p>The CVE auto-update engine generates modules from live vulnerabilities:</p>
<pre><span class="comment"># Example auto-generated module structure</span>
modules/<span class="var">cve-2026-44040_ultravnc_through_1822.py</span>
├── metadata: CVE ID, description, references
├── options: RHOSTS, RPORT
├── check()  <span class="comment"># Probe target for vulnerability</span>
└── run()    <span class="comment"># Execute the PoC</span></pre>

<h3>Writing Custom Modules</h3>
<p>Modules inherit from <code>NovaModule</code>:</p>
<pre><span class="keyword">from</span> core.module <span class="keyword">import</span> NovaModule, ModuleMetadata

<span class="keyword">class</span> <span class="func">Module</span>(NovaModule):
    metadata = ModuleMetadata(
        name=<span class="string">"my_custom_scanner"</span>,
        description=<span class="string">"Scans for custom service"</span>,
        rank=<span class="string">"good"</span>,
    )
    required_options = [<span class="string">"RHOSTS"</span>, <span class="string">"RPORT"</span>]

    <span class="keyword">def</span> <span class="func">run</span>(self) -> dict:
        host = self.options[<span class="string">"RHOSTS"</span>]
        port = <span class="func">int</span>(self.options[<span class="string">"RPORT"</span>])
        <span class="comment"># Your scanner code here</span>
        <span class="keyword">return</span> {<span class="string">"result"</span>: <span class="string">"ok"</span>}</pre>

<h3>Module Lifecycle</h3>
<div class="steps">
  <div class="step"><strong>Discover</strong> — ModuleManager scans module directories</div>
  <div class="step"><strong>Load</strong> — Module file is imported and instantiated</div>
  <div class="step"><strong>Configure</strong> — User sets RHOSTS, RPORT, etc.</div>
  <div class="step"><strong>Check</strong> — Non-destructive vulnerability probe</div>
  <div class="step"><strong>Run</strong> — Module executes against the target</div>
  <div class="step"><strong>Report</strong> — Results stored in target database</div>
</div>
    `

// ── Navigation ──
function showPage(id) {
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  event?.target?.classList?.add('active');
  // Also find the nav-link by data attribute
  document.querySelectorAll(`.nav-link[onclick*="'${id}'"]`).forEach(n => n.classList.add('active'));
  renderPage(id);
  window.scrollTo(0, 0);
}

function renderPage(id) {
  const page = PAGES[id];
  if (!page) return;
  const content = document.getElementById('content');
  content.innerHTML = `<h1>${page.title}</h1>${page.content}`;

  // Re-highlight code blocks
  document.querySelectorAll('pre code').forEach(block => {
    // Already handled by pre styling
  });

  // Update URL hash
  history.pushState(null, '', '#' + id);
}

// ── Search ──
function filterNav(q) {
  const links = document.querySelectorAll('.nav-link');
  const sections = document.querySelectorAll('.nav-section');
  q = q.toLowerCase().trim();
  links.forEach(link => {
    const text = link.textContent.toLowerCase();
    link.style.display = (!q || text.includes(q)) ? 'block' : 'none';
  });
  sections.forEach(s => {
    const visible = Array.from(s.querySelectorAll('.nav-link')).some(l => l.style.display !== 'none');
    s.style.display = visible ? 'block' : 'none';
  });
}

// ── Init ──
const hash = location.hash.replace('#', '');
if (hash && PAGES[hash]) {
  showPage(hash);
} else {
  renderPage('introduction');
}
